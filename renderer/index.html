<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>Spotube</title>
   <style>
  :root {
    --bg: #111111;
    --surface: #1c1c1c;
    --surface-hover: #292929;
    --border: #3a3a3a;

    --text: #ffffff;
    --muted: #bdbdbd;

    --primary: #ffd600;
    --primary-hover: #ffe44d;

    --secondary: #333333;
    --accent: #ffb300;
  }

  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
  }

  h1 {
    font-size: 20px;
    margin: 0 0 16px;
    color: var(--primary);
    letter-spacing: 1px;
  }

  label {
    display: block;
    font-size: 12px;
    margin: 12px 0 4px;
    color: var(--muted);
    font-weight: 600;
  }

  input {
    width: 100%;
    box-sizing: border-box;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }

  input:focus {
    border-color: var(--primary);
  }

  .row {
    display: flex;
    gap: 8px;
        margin: 12px 0 4px;

    align-items: center;
  }

  .row input {
    flex: 1;
  }

  button.secondary {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--secondary);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    font-weight: 600;
  }

  button.secondary:hover {
    background: var(--surface-hover);
    border-color: var(--primary);
  }

  button.primary {
    padding: 8px 14px;
    border: 0;
    border-radius: 4px;
    background: var(--primary);
    color: #111111;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  button.primary:hover {
    background: var(--primary-hover);
  }

  button:disabled {
    opacity: 0.5;
    cursor: default;
  }

  progress {
    width: 100%;
    height: 14px;
    margin-top: 16px;
    accent-color: var(--primary);
  }

  #log {
    margin-top: 16px;
    height: 200px;
    overflow: auto;
    background: #050505;
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 4px;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    color: #eeeeee;
  }
</style>
  </head>
  <body>
    <h1>SteamToPlayer</h1>

    <label>PLAYLIST_ID</label>
    <input id="playlistId" placeholder="e.g. 3pdwsDnzLp6Uks4dUutxp8" />

    <label>CLIENT_ID</label>
    <input id="clientId" />

    <label>CLIENT_SECRET</label>
    <input id="clientSecret" type="password" />

    <label>Download folder</label>
    <div class="row">
      <input id="downloadDir" placeholder="No folder selected" readonly />
      <button id="choose" class="secondary">Choose…</button>
    </div>

    <div class="row">
      <button id="start" class="primary">Start</button>
      <button id="stop" class="secondary" disabled>Stop</button>
    </div>
    <progress id="bar" value="0" max="100"></progress>
    <div id="log"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const logEl = $('log');

      function addLog(line) {
        logEl.textContent += line + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      }

      window.api.onLog(addLog);
      window.api.onProgress((p) => {
        $('bar').value = p.total ? (p.done / p.total) * 100 : 0;
      });

      $('choose').onclick = async () => {
        const dir = await window.api.chooseFolder();
        if (dir) $('downloadDir').value = dir;
      };

      $('stop').onclick = () => {
        $('stop').disabled = true;
        window.api.stop();
      };

      $('start').onclick = async () => {
        $('start').disabled = true;
        $('stop').disabled = false;
        $('bar').value = 0;
        logEl.textContent = '';
        try {
          await window.api.startDownload({
            playlistId: $('playlistId').value.trim(),
            clientId: $('clientId').value.trim(),
            clientSecret: $('clientSecret').value.trim(),
            downloadDir: $('downloadDir').value.trim(),
          });
        } finally {
          $('start').disabled = false;
          $('stop').disabled = true;
        }
      };
    </script>
  </body>
</html>
