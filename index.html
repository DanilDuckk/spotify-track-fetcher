<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; media-src 'self'" />
  <title>STREAM2PLAYER</title>
  <style>
    :root {
      /* Neutrals shifted warm so the yellow sits inside the palette, not on top of it. */
      --bg: #0c0b09;
      --surface: #1a1815;
      --surface-hover: #262320;
      --border: #3a352c;

      --text: #ffffff;
      --muted: #b8b0a0;

      --primary: #ffd600;
      --primary-hover: #ffe44d;

      --secondary: #2e2a24;
      --accent: #ffb300;

      --glow: rgba(255, 214, 0, 0.35);
    }

    @font-face {
      font-family: 'Persona';
      src: url('public/font/FOT-SkipStd-B.otf') format('opentype');
    }

    html {
      background: var(--bg);
    }

    html::before {
      content: '';
      position: fixed;
      inset: -50%;
      z-index: -3;
      pointer-events: none;
      background:
        radial-gradient(closest-side at 22% 26%, rgba(255, 214, 0, 0.13), transparent),
        radial-gradient(closest-side at 78% 66%, rgba(255, 110, 0, 0.10), transparent),
        radial-gradient(closest-side at 50% 98%, rgba(255, 179, 0, 0.07), transparent);
      animation: drift 34s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from {
        transform: translate3d(-2%, 1%, 0) scale(1) rotate(0deg);
      }

      to {
        transform: translate3d(3%, -2%, 0) scale(1.14) rotate(7deg);
      }
    }

    html::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.28) 0 1px, transparent 1px 3px),
        radial-gradient(130% 95% at 50% 0%, transparent 52%, rgba(0, 0, 0, 0.6));
    }

    body::before {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      top: -32vh;
      height: 30vh;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(180deg,
          transparent,
          rgba(255, 214, 0, 0.04) 46%,
          rgba(255, 255, 255, 0.028) 50%,
          rgba(255, 214, 0, 0.04) 54%,
          transparent);
      animation: roll 13s linear infinite;
    }

    @keyframes roll {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(165vh);
      }
    }

    body {
      font-family: 'Persona', system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      color: var(--text);
    }

    ::selection {
      background: var(--primary);
      color: #111111;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 16px;
    }

    h1 {
      font-size: 20px;
      margin: 0;
      color: var(--primary);
      letter-spacing: 1px;
      text-shadow: 0 0 24px var(--glow);
    }

    /* Fixed width so swapping the icon never shifts the header. */
    #mute {
      min-width: 46px;
      font-size: 14px;
      line-height: 1.7;
    }

    #mute.off {
      color: var(--muted);
    }

    label {
      display: block;
      font-size: 12px;
      margin: 12px 0 4px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 1.5px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    input:hover {
      border-color: #4d463a;
    }

    input:focus {
      border-color: var(--primary);
      background: var(--surface-hover);
      box-shadow: 0 0 0 2px rgba(255, 214, 0, 0.16), 0 0 18px rgba(255, 214, 0, 0.10);
    }

    input::placeholder {
      color: #6f675a;
    }

    input:read-only {
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 8px;
      margin: 12px 0 4px;

      align-items: center;
    }

    .row input {
      flex: 1;
    }

    .section {
      width: 400px;
    }

    .container {
      display: flex;
      gap: 24px;
    }

    button {
      font-family: 'Persona', sans-serif;
      transition: background .18s ease, border-color .18s ease, box-shadow .18s ease, color .18s ease;
    }

    button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    button.secondary {
      padding: 2px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--secondary);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }

    button.secondary:hover {
      background: var(--surface-hover);
      border-color: var(--primary);
      color: var(--primary);
    }

    button.primary {
      padding: 2px 14px;
      border: 0;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--primary-hover), var(--accent));
      color: #111111;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 14px rgba(255, 214, 0, 0.22);
    }

    button.primary:hover {
      background: linear-gradient(180deg, #fff17a, var(--primary));
      box-shadow: 0 0 26px rgba(255, 214, 0, 0.45);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    button.primary:disabled,
    button.secondary:disabled:hover {
      box-shadow: none;
      background: var(--secondary);
      color: var(--text);
      border-color: var(--border);
    }

    button.primary:disabled {
      background: var(--secondary);
    }

    progress {
      width: 100%;
      height: 14px;
      margin-top: 20px;
      accent-color: var(--primary);
      appearance: none;
      -webkit-appearance: none;
    }

    progress::-webkit-progress-bar {
      background: var(--surface);
      border-radius: 4px;
      box-shadow: inset 0 0 0 1px var(--border);
    }

    progress::-webkit-progress-value {
      border-radius: 4px;
      background-image: linear-gradient(90deg, var(--accent), var(--primary-hover), var(--accent));
      background-size: 200% 100%;
      box-shadow: 0 0 12px rgba(255, 214, 0, 0.5);
      animation: shimmer 2.4s linear infinite;
    }

    @keyframes shimmer {
      to {
        background-position: -200% 0;
      }
    }

    #log {
      height: 200px;
      overflow: auto;
      background: #050505;
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: 4px;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      color: #e8e4dc;
      box-shadow: inset 0 0 40px rgba(255, 179, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.6);
    }

    #log::-webkit-scrollbar {
      width: 8px;
    }

    #log::-webkit-scrollbar-track {
      background: transparent;
    }

    #log::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    #log::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    @media (prefers-reduced-motion: reduce) {

      html::before,
      progress::-webkit-progress-value {
        animation: none;
      }

      body::before {
        display: none;
      }

      * {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <h1>STREAM2PLAYER ♪</h1>
    <button id="mute" class="secondary" title="Mute music">||</button>
  </header>
  <div class="container">
    <section class="section">
      <label>PLAYLIST_ID</label>
      <input id="playlistId" placeholder="e.g. 3pdwsDnzLp6Uks4dUutxp8" />

      <label>CLIENT_ID</label>
      <input id="clientId" />

      <label>CLIENT_SECRET</label>
      <input id="clientSecret" type="password" />

      <label>DOWNLOAD FOLDER</label>
      <div class="row">
        <input id="downloadDir" placeholder="No folder selected" readonly />
        <button id="choose" class="secondary">Choose</button>
      </div>

      <div class="row">
        <button id="start" class="primary">Start</button>
        <button id="stop" class="secondary" disabled>Stop</button>
      </div>
    </section>
    <section class="section">
      <label>LOGS</label>
      <div id="log"></div>
      <progress id="bar" value="0" max="100"></progress>
    </section>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const logEl = $('log');

    function addLog(line) {
      logEl.textContent += line + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    // --- Background music -------------------------------------------------
    // Put your track here. public/** is already in build.files, so it ships
    // with the packaged app automatically.
    const BGM_SRC = 'public/bgm.mp3';

    const bgm = new Audio(BGM_SRC);
    bgm.loop = true;    // restarts by itself when it ends
    bgm.volume = 0.35;

    bgm.addEventListener('error', () => {
      addLog(`[WARNING] Music not loaded: ${BGM_SRC}`);
    });

    function playBgm() {
      bgm.currentTime = 0;
      // Called from a click handler, so the autoplay policy allows it.
      bgm.play().catch((e) => addLog(`[WARNING] Music: ${e.message}`));
    }

    function stopBgm() {
      bgm.pause();
    }

    $('mute').onclick = () => {
      bgm.muted = !bgm.muted;
      $('mute').textContent = bgm.muted ? '▷' : '||';
      $('mute').classList.toggle('off', bgm.muted);
      $('mute').title = bgm.muted ? 'Unmute music' : 'Mute music';
    };

    window.api.onLog(addLog);
    window.api.onProgress((p) => {
      $('bar').value = p.total ? (p.done / p.total) * 100 : 0;
    });

    $('choose').onclick = async () => {
      const dir = await window.api.chooseFolder();
      if (dir) $('downloadDir').value = dir;
    };

    $('stop').onclick = () => {
      $('stop').disabled = true;
      stopBgm();
      window.api.stop();
    };

    $('start').onclick = async () => {
      $('start').disabled = true;
      $('stop').disabled = false;
      $('bar').value = 0;
      logEl.textContent = '';
      playBgm();
      try {
        await window.api.startDownload({
          playlistId: "67ttn9jNPuIvkVuyOgpmlB",// $('playlistId').value.trim(),
          clientId: "08ff926e2bdd425a9a7b9575edcd8841",// $('clientId').value.trim(),
          clientSecret: "416d618d6d894e6a9f45ba5d1f7fce7d",// $('clientSecret').value.trim(),
          downloadDir: $('downloadDir').value.trim(),
        });
      } finally {
        stopBgm();
        $('start').disabled = false;
        $('stop').disabled = true;
      }
    };
  </script>
</body>

</html>
